<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>
  Математиканы оқыту әдістемесі
</title>

<style>
* {
  box-sizing: border-box;
}

:root {
  --primary: #7c3aed;
  --primary-dark: #5b21b6;
  --primary-light: #ede9fe;

  --background: #f7f5fb;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #667085;
  --border: #ddd6e8;

  --correct: #15803d;
  --correct-background: #dcfce7;

  --wrong: #b91c1c;
  --wrong-background: #fee2e2;

  --partial: #a16207;
  --partial-background: #fef3c7;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Arial,
    sans-serif;
  background: var(--background);
  color: var(--text);
  line-height: 1.55;
}

header {
  padding: 34px 16px 58px;
  background:
    linear-gradient(
      135deg,
      #6d28d9,
      #9333ea
    );
  color: white;
  text-align: center;
}

header h1 {
  margin: 0 0 10px;
  font-size: 34px;
  line-height: 1.2;
}

header p {
  margin: 0;
  font-size: 17px;
  opacity: 0.95;
}

.container {
  width: min(
    960px,
    calc(100% - 24px)
  );
  margin: -32px auto 55px;
}
    .section-header {
  padding: 22px;
  margin-bottom: 15px;
  background: white;
  border-radius: 17px;
  box-shadow:
    0 5px 20px
    rgba(31, 41, 55, 0.08);
}

.section-header h2 {
  margin: 0 0 7px;
  color: var(--primary);
  font-size: 28px;
}

.section-header p {
  margin: 0;
  color: var(--muted);
}

.section-information {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  margin-top: 13px;
}

.information-badge {
  display: inline-flex;
  align-items: center;
  padding: 7px 11px;
  border-radius: 999px;
  background: var(--primary-light);
  color: var(--primary-dark);
  font-size: 14px;
  font-weight: 800;
}

.progress-card {
  padding: 16px 18px;
  margin-bottom: 15px;
  background: white;
  border-radius: 15px;
  box-shadow:
    0 4px 18px
    rgba(31, 41, 55, 0.07);
}

.progress-information {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 9px;
  color: var(--muted);
}

.progress-information strong {
  color: var(--primary);
}

.progress-line {
  width: 100%;
  height: 10px;
  overflow: hidden;
  border-radius: 999px;
  background: #e7e2ee;
}

.progress-line span {
  display: block;
  width: 0;
  height: 100%;
  border-radius: 999px;
  background: var(--primary);
  transition: width 0.25s;
}
    .question {
  margin-bottom: 18px;
  padding: 22px;
  background: white;
  border-radius: 18px;
  box-shadow:
    0 5px 18px
    rgba(31,41,55,.08);
}

.question-number{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:7px 14px;
  margin-bottom:14px;
  border-radius:999px;
  background:var(--primary-light);
  color:var(--primary-dark);
  font-size:14px;
  font-weight:800;
}

.question-title{
  margin:0 0 18px;
  font-size:21px;
  line-height:1.5;
}

.options{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.option{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:14px 16px;
  border:2px solid var(--border);
  border-radius:14px;
  cursor:pointer;
  transition:.2s;
}

.option:hover{
  border-color:var(--primary);
  background:#faf8ff;
}

.option input{
  margin-top:4px;
}

.option-letter{
  font-weight:800;
  color:var(--primary-dark);
  min-width:26px;
}

.option.correct{
  border-color:var(--correct);
  background:var(--correct-background);
}

.option.wrong{
  border-color:var(--wrong);
  background:var(--wrong-background);
}

.option.partial{
  border-color:var(--partial);
  background:var(--partial-background);
}
    .multiple-answer-hint {
  margin: -4px 0 14px;
  padding: 10px 12px;
  border-radius: 10px;
  background: #fef3c7;
  color: #92400e;
  font-size: 14px;
  font-weight: 800;
}

.explanation {
  display: none;
  margin-top: 18px;
  padding-top: 17px;
  border-top: 1px solid #e4e7ec;
}

.question.checked .explanation {
  display: block;
}

.question-score {
  margin-bottom: 12px;
  padding: 11px 14px;
  border-radius: 10px;
  font-weight: 900;
}

.question-score.full {
  background: var(--correct-background);
  color: #166534;
}

.question-score.partial {
  background: var(--partial-background);
  color: var(--partial);
}

.question-score.zero {
  background: var(--wrong-background);
  color: #991b1b;
}

.correct-answer {
  padding: 12px 14px;
  border-radius: 11px;
  background: var(--correct-background);
  color: #166534;
  font-weight: 800;
}

.explanation-title {
  margin: 14px 0 7px;
  color: var(--primary-dark);
  font-size: 17px;
  font-weight: 900;
}

.explanation-text {
  margin: 0;
  padding: 13px 14px;
  border-radius: 11px;
  background: #faf8ff;
}

.key-fact {
  margin-top: 11px;
  padding: 12px 14px;
  border-left: 5px solid var(--primary);
  border-radius: 8px;
  background: var(--primary-light);
  font-weight: 750;
}
    .result-card{
  display:none;
  margin:20px 0;
  padding:24px;
  border-radius:18px;
  background:white;
  text-align:center;
  box-shadow:0 5px 18px rgba(31,41,55,.08);
}

.result-card.show{
  display:block;
}

.result-card h3{
  margin:0 0 12px;
  color:var(--primary);
  font-size:28px;
}

.score{
  font-size:42px;
  font-weight:900;
  color:var(--primary-dark);
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  justify-content:center;
  margin:28px 0 50px;
}

button{
  border:none;
  cursor:pointer;
  border-radius:14px;
  padding:16px 28px;
  font-size:17px;
  font-weight:800;
  transition:.2s;
}

.show-result-button{
  background:var(--primary);
  color:#fff;
}

.show-result-button:hover{
  background:var(--primary-dark);
}

.reset-button{
  background:#eef2ff;
  color:var(--primary-dark);
}

.reset-button:hover{
  background:#ddd6fe;
}

@media(max-width:768px){

.question{
padding:18px;
}

.question-title{
font-size:19px;
}

.score{
font-size:34px;
}

header h1{
font-size:28px;
}

}

</style>
</head>

    function getCorrectIndexes(question) {
  return Array.isArray(question.correct)
    ? [...question.correct]
    : [question.correct];
}

function getSelectedIndexes(questionBlock) {
  return Array.from(
    questionBlock.querySelectorAll(
      "input:checked"
    )
  )
    .map(input => Number(input.value))
    .sort((a, b) => a - b);
}

function arraysAreEqual(
  firstArray,
  secondArray
) {
  if (
    firstArray.length !==
    secondArray.length
  ) {
    return false;
  }

  return firstArray.every(
    (value, index) =>
      value === secondArray[index]
  );
}

function calculateQuestionScore(
  selectedIndexes,
  correctIndexes
) {
  if (
    arraysAreEqual(
      selectedIndexes,
      correctIndexes
    )
  ) {
    return 2;
  }

  if (selectedIndexes.length === 0) {
    return 0;
  }

  const selectedCorrectCount =
    selectedIndexes.filter(index =>
      correctIndexes.includes(index)
    ).length;

  const selectedWrongCount =
    selectedIndexes.filter(index =>
      !correctIndexes.includes(index)
    ).length;

  const missedCorrectCount =
    correctIndexes.filter(index =>
      !selectedIndexes.includes(index)
    ).length;

  const differences =
    selectedWrongCount +
    missedCorrectCount;

  if (
    selectedCorrectCount > 0 &&
    differences === 1
  ) {
    return 1;
  }

  return 0;
}

function getCorrectAnswerText(question) {
  return getCorrectIndexes(question)
    .map(index => {
      return `
        ${letters[index]})
        ${question.options[index]}
      `;
    })
    .join("<br>");
}

function renderQuestion(
  question,
  questionIndex
) {
  const correctIndexes =
    getCorrectIndexes(question);

  const isMultiple =
    correctIndexes.length > 1;

  const inputType =
    isMultiple
      ? "checkbox"
      : "radio";

  const multipleHint =
    isMultiple
      ? `
        <div class="multiple-answer-hint">
        /
        </div>
      `
      : "";

  const optionsHtml =
    question.options
      .map((option, optionIndex) => {
        return `
          <label
            class="option"
            data-option-index="${optionIndex}"
          >
            <input
              type="${inputType}"
              name="question${questionIndex}"
              value="${optionIndex}"
            >

            <span class="option-letter">
              ${letters[optionIndex]})
            </span>

            <span>
              ${option}
            </span>
          </label>
        `;
      })
      .join("");

  return `
    <article
      class="question"
      data-question-index="${questionIndex}"
    >
      <div class="question-number">
        ${question.number}-сұрақ
      </div>

      <h3 class="question-title">
        ${question.question}
      </h3>

      ${multipleHint}

      <div class="options">
        ${optionsHtml}
      </div>

      <div class="explanation">

        <div class="question-score"></div>

        <div class="correct-answer">
          Дұрыс жауап:<br>
          ${getCorrectAnswerText(question)}
        </div>

        <div class="explanation-title">
          Түсіндірме
        </div>

        <p class="explanation-text">
          ${question.explanation}
        </p>

        <div class="key-fact">
          ${question.keyFact}
        </div>

      </div>
    </article>
  `;
}

function renderQuestions() {
  const quiz =
    document.getElementById("quiz");

  quiz.innerHTML =
    questions
      .map((question, questionIndex) => {
        return renderQuestion(
          question,
          questionIndex
        );
      })
      .join("");

  quiz
    .querySelectorAll("input")
    .forEach(input => {
      input.addEventListener(
        "change",
        updateProgress
      );
    });
}

function updateProgress() {
  const questionBlocks =
    document.querySelectorAll(
      ".question"
    );

  let answeredQuestions = 0;

  questionBlocks.forEach(
    questionBlock => {
      if (
        questionBlock.querySelector(
          "input:checked"
        )
      ) {
        answeredQuestions++;
      }
    }
  );

  document.getElementById(
    "progressText"
  ).textContent =
    `${answeredQuestions} / ${questions.length}`;

  const percentage =
    answeredQuestions /
    questions.length *
    100;

  document.getElementById(
    "progressBar"
  ).style.width =
    `${percentage}%`;
}

function markAnswers(
  questionBlock,
  selectedIndexes,
  correctIndexes
) {
  questionBlock
    .querySelectorAll(".option")
    .forEach((option, optionIndex) => {
      option.classList.remove(
        "correct",
        "wrong",
        "partial"
      );

      if (
        correctIndexes.includes(
          optionIndex
        )
      ) {
        option.classList.add(
          "correct"
        );
      }

      if (
        selectedIndexes.includes(
          optionIndex
        ) &&
        !correctIndexes.includes(
          optionIndex
        )
      ) {
        option.classList.add(
          "wrong"
        );
      }
    });
}

function showQuestionScore(
  questionBlock,
  points
) {
  const scoreElement =
    questionBlock.querySelector(
      ".question-score"
    );

  scoreElement.classList.remove(
    "full",
    "partial",
    "zero"
  );

  scoreElement.textContent =
    `Бұл сұрақ бойынша: ${points} / 2 балл`;

  if (points === 2) {
    scoreElement.classList.add(
      "full"
    );
  } else if (points === 1) {
    scoreElement.classList.add(
      "partial"
    );
  } else {
    scoreElement.classList.add(
      "zero"
    );
  }
}

function showResults() {
  const questionBlocks =
    document.querySelectorAll(
      ".question"
    );

  let totalPoints = 0;

  questionBlocks.forEach(
    (questionBlock, questionIndex) => {
      const question =
        questions[questionIndex];

      const selectedIndexes =
        getSelectedIndexes(
          questionBlock
        );

      const correctIndexes =
        getCorrectIndexes(question)
          .sort((a, b) => a - b);

      const points =
        calculateQuestionScore(
          selectedIndexes,
          correctIndexes
        );

      totalPoints += points;

      markAnswers(
        questionBlock,
        selectedIndexes,
        correctIndexes
      );

      showQuestionScore(
        questionBlock,
        points
      );

      questionBlock.classList.add(
        "checked"
      );

      questionBlock
        .querySelectorAll("input")
        .forEach(input => {
          input.disabled = true;
        });
    }
  );

  document.getElementById(
    "score"
  ).textContent =
    `${totalPoints} / 40`;

  const resultCard =
    document.getElementById(
      "resultCard"
    );

  resultCard.classList.add("show");

  resultCard.scrollIntoView({
    behavior: "smooth",
    block: "center"
  });
}

function resetTest() {
  document
    .querySelectorAll("input")
    .forEach(input => {
      input.checked = false;
      input.disabled = false;
    });

  document
    .querySelectorAll(".option")
    .forEach(option => {
      option.classList.remove(
        "correct",
        "wrong",
        "partial"
      );
    });

  document
    .querySelectorAll(".question")
    .forEach(questionBlock => {
      questionBlock.classList.remove(
        "checked"
      );

      const scoreElement =
        questionBlock.querySelector(
          ".question-score"
        );

      scoreElement.textContent = "";

      scoreElement.classList.remove(
        "full",
        "partial",
        "zero"
      );
    });

  document.getElementById(
    "resultCard"
  ).classList.remove("show");

  document.getElementById(
    "score"
  ).textContent =
    "0 / 40";

  updateProgress();

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

renderQuestions();
updateProgress();

</script>
